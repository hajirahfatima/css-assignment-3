<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shapes</title>
    <style>
        .box {
            width: 200px;
            height: 100px;
            border: 2px solid rgb(0, 0, 0);
            border-color: #0000FF #7373bd #09098e;
            padding: 10px;
            margin: 20px;
            border-radius: 20px;
        }

        .box_2 {
            width: 200px;
            height: 100px;
            border: 10px solid rgb(0, 0, 0);
            border-color: #FF0000 #FF6347 #f39191;
            padding: 10px;
            margin: 20px;
            border-radius: 20px;
        }

        .box_3 {
            width: 200px;
            height: 100px;
            border: 10px solid rgb(0, 0, 0);
            border-color: #FF00BF #FF69B4  #eec0c8;
            padding: 10px;
            margin: 20px;
            border-radius: 30px
        }

        .box_4 {
            width: 200px;
            height: 100px;
            border: 10px solid rgb(0, 0, 0);
            border-color: #00FF00 #7CFC00 #ffffff;
            padding: 10px;
            margin: 20px;
            border-radius: 30px
        }

        .box_5 {
            width: 200px;
            height: 150px;
            border: 10px solid rgb(0, 0, 0);
            border-color: #FFFF00 #FFD700 #ffffff;
            padding: 10px;
            margin: 20px;
            border-radius: 30px 100px 0px 0px;
        }

        .box_6 {
            width: 200px;
            height: 120px;
            border: 10px solid black;
            border-radius: 5% 60% 5% 60%;
            border-color:#00BFFF #1E90FF #87CEFA;
            border-width:10px 20px 30px 10px;
        }
        .box_7 {
            width: 200px;
            height: 120px;
            border: 10px solid black;
            border-radius: 50% 50% 50% 50%;
            border-color:#4B0082 #DDA0DD#662d91;
            border-width:10px;
            text-align: center;
        }
        .box_8 {
            width: 150px;
            height: 150px;
            border: 10px solid black;
            border-radius: 50% 50% 0% 0%;
            border-color:#20B2AA #40E0D0 #00ffe5;
            border-width:10px;
        }
        .box_9 {
            width: 150px;
            height: 130px;
            border: 10px solid black;
            border-radius: 20px;
            border-color:#FF4500 #FF6347 #ff7f50;
            border-width: 30px;
        }
        .box_10 {
            width: 150px;
            height: 130px;
            border: 10px solid black;
            border-radius: 20px;
            border-color:#72A0C1 #B0C4DE #ADD8E6;
            border-width: 40px;
        }
    </style>
</head>

<body>
    <div class="box">
        Case 1
    </div>
    <div class="box_2">
        Case 2
    </div>
    <div class="box_3">
        Case 3
    </div>
    <div class="box_4">
        Case 4
    </div>
    <div class="box_5">
        Case 5
    </div>
    <div class="box_6">
        Case 6
    </div>
    <br>
    <div class="box_7">
        Case 7
    </div>
    <br>
    <div class="box_8">
        Case 8
    </div>
    <br>
    <div class="box_9">
        Case 9
    </div>
    <br>
    <div class="box_10">
        Case 10 
    </div>

</body>

</html>
